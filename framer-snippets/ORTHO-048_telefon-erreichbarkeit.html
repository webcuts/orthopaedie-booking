<!--
  ORTHO-048: Telefonische Erreichbarkeit
  Einbindung: Framer → Kontaktseite und/oder Startseite → Custom Code Block

-->
<style>
  .telefon-erreichbarkeit {
    max-width: 400px;
    margin: 1.5rem auto;
    background: white;
    border: 1px solid #E5E7EB;
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .telefon-erreichbarkeit__header {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    margin-bottom: 1rem;
  }

  .telefon-erreichbarkeit__icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #EFF6FF, #DBEAFE);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .telefon-erreichbarkeit__title {
    font-size: 1rem;
    font-weight: 600;
    color: #1f2937;
    margin: 0;
  }

  .telefon-erreichbarkeit__times {
    display: flex;
    flex-direction: column;
    gap: 0.375rem;
    margin-bottom: 1rem;
  }

  .telefon-erreichbarkeit__row {
    display: flex;
    justify-content: space-between;
    font-size: 0.875rem;
    padding: 0.375rem 0;
    border-bottom: 1px solid #F3F4F6;
  }

  .telefon-erreichbarkeit__row:last-child {
    border-bottom: none;
  }

  .telefon-erreichbarkeit__day {
    color: #374151;
    font-weight: 500;
  }

  .telefon-erreichbarkeit__hours {
    color: #6b7280;
  }

  .telefon-erreichbarkeit__phone {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem;
    background: #2674BB;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    transition: background 0.15s;
  }

  .telefon-erreichbarkeit__phone:hover {
    background: #1a5a9a;
  }

<div class="telefon-erreichbarkeit">
